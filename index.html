<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Messi</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="fireworks"></canvas>

<!-- 🎵 MUSIC (add your own mp3 in project) -->
<audio id="music" src="music.mp3" autoplay loop></audio>

<!-- 📖 BOOK -->
<section id="book" class="page show">
    <h1>📖 Opening Book...</h1>
    <p>Tap anywhere to start</p>
</section>

<!-- 🎂 CAKE -->
<section id="cake" class="page">
    <h1>🎂 Happy Birthday Messi 🎂</h1>
    <div class="cake">
        <div id="flame">🔥</div>
    </div>
    <p>Blow the candle 🎤</p>
</section>

<!-- ⚽ SLIDER -->
<section id="slider" class="page">
    <h1>⚽ Messi Journey</h1>
    <img id="slide">
</section>

<!-- 🐐 FLYER -->
<section id="flyer" class="page">
    <h1 class="glow">HAPPY BIRTHDAY TO THE GOAT 🐐</h1>
    <img src="images/flyer-goat.jpg" class="big-img">
</section>

<!-- 📝 MESSAGE -->
<section id="message" class="page">

    <img src="images/worldcup-touch.jpg" class="medium-img reveal">

    <div class="message-card reveal">
        <h2 class="title">HAPPY BIRTHDAY LIONEL MESSI 🐐</h2>
        <p id="typedText" class="message-text"></p>
    </div>

</section>

<!-- 🐐 FINAL -->
<section id="final" class="page">
    <h1 class="final">🐐 HAPPY BIRTHDAY GOAT 🐐</h1>
</section>

<script src="script.js"></script>
</body>
</html>
